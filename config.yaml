# config.yaml
pipeline:
  bronze_dir: "data/bronze"
  silver_dir: "data/silver"
  gold_dir:   "data/gold"
  output_format: "parquet"

gold:
  enabled: true
  output_dir: "data/gold"

quality:
  completeness:
    warning_threshold: 0.90
    error_threshold: 0.70
    field_overrides:
      salary_min: 0.15
      salary_max: 0.15
      deadline: 0.60             # ↑ từ 0.35 lên 0.50
      normalized_role: 0.55   # Cho phép 55% role xác định
      skills: 0.75
  validity:
    warning_threshold: 5
    error_threshold: 20
  enabled_stages:
    - completeness
    - validity
    - accuracy
    - uniqueness
    - timeliness
  report_formats:
    - markdown
    - json
  report_dir: "data/quality"
  stop_on_error: false  