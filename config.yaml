# config.yaml
pipeline:
  bronze_dir: "data/bronze"
  silver_dir: "data/silver"
  gold_dir: "data/gold"
  output_format: "parquet"
gold:
  enabled: true
  output_dir: "data/gold"

quality:
  completeness:
    warning_threshold: 0.95
    error_threshold: 0.80
    field_overrides:
      salary_min: 0.25
      salary_max: 0.25
  validity:
    warning_threshold: 5
    error_threshold: 15
  enabled_stages:
    - completeness
    - validity
    - accuracy
    - uniqueness
    - timeliness
  report_formats:
    - markdown
    - json
  report_dir: "data/quality"
  stop_on_error: true